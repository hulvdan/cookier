# «Hostility» is about colors of «spawn crosses» in brotato.
# Colors differ based on whether a creature that will be spawned
# would be neutral (like trees), friendly (like flying bots), or hostile (like mobs).
hostilities:
  - type: INVALID
  - type: MOB
    color: 0xc02931
  - type: NEUTRAL
    color: 0x66a650
  - type: FRIENDLY
    color: 0x208cb2
creatures:
  - type: INVALID
  - type: PLAYER
    speed_force: 17
    hostility_type: FRIENDLY
    color: 0x208cb2
    texture_ids:
      - game_creature_player
  - type: MOB1
    health: 2
    damage: 1
    speed_force: 14
    color: 0xa13d77
    texture_ids:
      - game_creature_player
  - type: MOB2
    health: 3
    damage: 2
    color: 0xb8560f
    speed_force: 12
    texture_ids:
      - game_creature_player
  - type: MOB3
    health: 3
    damage: 2
    color: 0x82dcd7
    speed_force: 12
    on_death_spawns_creature_type: MOB1
    on_death_spawns_count_min: 4
    on_death_spawns_count_max: 6
    on_death_spawns_distance_min: 3
    on_death_spawns_distance_max: 1
    texture_ids:
      - game_creature_player
  - type: TREE
    health: 5
    hostility_type: NEUTRAL
    can_be_knocked_back: false
    texture_ids:
      - game_creature_tree
items:
  - type: INVALID
  - type: SUGAR
    texture_id: ui_item_sugar
    tier: 2
  - type: MILK
    texture_id: ui_item_milk
    tier: 0
weapons:
  # If a weapon doesn't have `projectile_type` specified,
  # then it's a melee weapon that gets "shot" itself.
  - type: INVALID
  - type: SWORD
    damage: 2
    cooldown_frames: 20
    shooting_duration_frames: 10
    range: 3
    impulse: 100
    melee_collider_height_px: 76
    texture_ids:
      - game_weapon_sword
  - type: GUN
    projectile_type: BULLET
    damage: 1.0
    cooldown_frames: 10
    shooting_duration_frames: 20
    projectile_spawn_frames:
      - 6
    range: 5
    texture_ids:
      - game_weapon_gun
  - type: BOW
    projectile_type: ARROW
    damage: 1.5
    cooldown_frames: 16
    shooting_duration_frames: 10
    projectile_spawn_frames:
      - 4
    range: 8
    texture_ids:
      - game_weapon_bow
