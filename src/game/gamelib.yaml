# weapon_kinds: # {  ###
#   - type: INVALID
#   - type: MELEE
#   - type: RANGED
#   - type: ELEMENTAL
# # }
weapons: # {  ###
  #
  # If a weapon doesn't have `projectile_type` specified,
  # then it's a STRIKING weapon that gets "shot" itself.
  #
  # In case of STRIKING weapons:
  #
  #     `range_meters` is how far weapon travels from it's offset pos.
  #     It DOES NOT include weapon's texture width!
  #     Weapons have a minimum of 1 meter range.
  #     NOTE: screen size is 28.24 x 15.89 meters.
  #
  #
  #                range_meters
  #            <------------------>
  #  _______                    _______
  # |player |      weapon's    |weapon |
  # |   .   |  . < offset      |   .   |
  # |_______|      pos         |_______|
  #
  #
  # In case of SHOOTING weapons:
  #
  #     `range_meters` is how far weapon's projectiles go.
  #     It doesn't account for projectile's size.
  #
  - type: INVALID
  - type: MELEE_0_CACTI_CLUB # кактусовый меч
    base_damage: 10 20 30 50
    damage_scalings:
      - stat_type: DAMAGE_MELEE
        percents_per_tier: 80 85 90 100
    cooldown: 1.66 1.58 1.51 1.36
    crit_damage_multiplier: 2 2 2 2
    crit_chance: 3 3 3 3
    range_meters: 4.7 4.7 4.7 4.7
    knockback_meters: 8 8 8 8
    melee_collider_height_px: 54
    effects:
      - effectcondition_type: HIT_SPAWNS__X__PROJECTILES_DEALING__Y__DAMAGE
        damage_scalings:
          - stat_type: DAMAGE_RANGED
            percents_per_tier: 50 60 70 80
        projectile_type: NEEDLE_CACTUS
        projectile_range_meters: 4.66
        placeholders:
          - ints: 3 4 5 6
          - ints: 0 0 0 0
        only_this_weapon: true
    price: 149
  - type: MELEE_0_CHOPPER # боевой саженец
