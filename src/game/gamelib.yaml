weapons: # {  ###
  #
  # If a weapon doesn't have `projectile_type` specified,
  # then it's a STRIKING weapon that gets "shot" itself.
  #
  # In case of STRIKING weapons:
  #
  #     `range_meters` is how far weapon travels from it's offset pos.
  #     It DOES NOT include weapon's texture width!
  #     Weapons have a minimum of 1 meter range.
  #     NOTE: screen size is 32x18 meters.
  #
  #
  #                range_meters
  #            <------------------>
  #  _______                    _______
  # |player |      weapon's    |weapon |
  # |   .   |  . < offset      |   .   |
  # |_______|      pos         |_______|
  #
  #
  # In case of SHOOTING weapons:
  #
  #     `range_meters` is how far weapon's projectiles go.
  #     It doesn't account for projectile's size.
  #
  - type: INVALID
  - type: SWORD
    min_tier_index: 0
    weaponkind_type: MELEE
    base_damage: 6 9 12 20
    damage_scalings:
      - stat_type: DAMAGE_MELEE
        percents_per_tier: 80 80 80 80
    crit_damage_multiplier: 1.5
    price: 122
    cooldown_frames: 20
    shooting_duration_frames: 10
    range_meters: 3
    knockback_meters: 5
    life_steal_percents: 1.5 1.5 1.5 1.5
    melee_collider_height_px: 76
    icon_texture_id: game_weapon_sword
    texture_ids:
      - game_weapon_sword
      # effects:
      # - stat_type: HP
      #   value: 1 2 3 4
      #   value_multiplier: 1 1 1 1
      #   value_multiplier: 0.5 0.5 0.5 0.5
      #
      # - effectcondition_type: X_PERCENT_MORE_DAMAGE_TO_ENEMIES_ABOVE_Y_PERCENT_HP
      #   placeholders:
      #     - ints: 20 20 20 20
      #     - ints: 70 65 60 55
      #
      # - effectcondition_type: MORE_EMPTY_WEAPON_SLOTS_MORE__PROPERTY
      #   weaponproperty_type: DAMAGE
      #   value: 4 5 6 8
      #
      # - effectcondition_type: GET__STAT__FOR_EVERY_OCCUPIED_WEAPON_SLOT
      #   stat_type: DAMAGE
      #   value: 3 5 7 10
      #
