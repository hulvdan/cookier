        percents_per_tier:
          - 80
          - 80
          - 80
          - 80
    crit_damage_multiplier: 1.5
    max_price: 122
    cooldown_frames: 20
    shooting_duration_frames: 10
    range_meters: 3
    knockback_meters: 5
    life_steal_percent: 1.5
