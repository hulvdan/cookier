weapons:
  #
  # If a weapon doesn't have `projectile_type` specified,
  # then it's a STRIKING weapon that gets "shot" itself.
  #
  # In case of STRIKING weapons:
  #
  #     `range_meters` is how far weapon travels from it's offset pos.
  #     It DOES NOT include weapon's texture width!
  #     Weapons have a minimum of 1 meter range.
  #     NOTE: screen size is 32x18 meters.
  #
  #
  #                range_meters
  #            <------------------>
  #  _______                    _______
  # |player |      weapon's    |weapon |
  # |   .   |  . < offset      |   .   |
  # |_______|      pos         |_______|
  #
  #
  # In case of SHOOTING weapons:
  #
  #     `range_meters` is how far weapon's projectiles go.
  #     It doesn't account for projectile's size.
  #
  - type: INVALID
  - type: SWORD
    min_tier_index: 0
    weaponkind_type: MELEE
    base_damage:
      - 6.0
      - 9.0
      - 12.0
      - 20.0
    damage_scalings:
      - stat_type: DAMAGE_MELEE
        percents_per_tier:
          - 80
          - 80
          - 80
          - 80
    critical_damage: 2
    max_price: 122
    cooldown_frames: 20
    shooting_duration_frames: 10
    range_meters: 2
    knockback_meters: 5
    melee_collider_height_px: 76
    effects:
      - effectcondition_type: KILL_N_ENEMIES_USING_THIS_WEAPON_GET_STAT
        stat_type: ATTACK_SPEED
        value: 1
        condition_value: 20
    texture_ids:
      - game_weapon_sword
  - type: GUN
    min_tier_index: 0
    base_damage:
      - 6.0
      - 9.0
      - 12.0
      - 20.0
    weaponkind_type: RANGED
