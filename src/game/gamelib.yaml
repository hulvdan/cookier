weapons:
  #
  # If a weapon doesn't have `projectile_type` specified,
  # then it's a STRIKING weapon that gets "shot" itself.
  #
  # In case of STRIKING weapons:
  #
  #     `range_meters` is how far weapon travels from it's offset pos.
  #     It DOES NOT include weapon's texture width!
  #     Weapons have a minimum of 1 meter range.
  #     NOTE: screen size is 32x18 meters.
  #
  #
  #                range_meters
  #            <------------------>
  #  _______                    _______
  # |player |      weapon's    |weapon |
  # |   .   |  . < offset      |   .   |
  # |_______|      pos         |_______|
  #
  #
  # In case of SHOOTING weapons:
  #
  #     `range_meters` is how far weapon's projectiles go.
  #     It doesn't account for projectile's size.
  #
  - type: INVALID
  - type: SWORD
    min_tier_index: 0
    weaponkind_type: MELEE
    base_damage:
      - 6
      - 9
      - 12
      - 20
    damage_scalings:
